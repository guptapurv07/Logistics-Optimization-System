<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logistics ERP | Shipment Planning</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            background: #1a1a2e; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif;
        }
        .entry-container { 
            background: white; 
            padding: 45px; 
            border-radius: 24px; 
            max-width: 900px; 
            width: 95%; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            animation: reveal 0.8s ease-out;
        }
        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header-box { 
            border-bottom: 3px solid #e94560; 
            margin-bottom: 35px; 
            padding-bottom: 15px; 
        }
        .shipment-row { 
            display: flex; 
            gap: 12px; 
            background: #fcfcfc; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #eee; 
            align-items: center;
            transition: 0.3s;
        }
        .shipment-row:hover {
            border-color: #e94560;
            background: #fff;
        }
        .shipment-row input { 
            padding: 12px; 
            border: 1.5px solid #eee; 
            border-radius: 8px; 
            font-size: 0.9rem;
            outline: none;
        }
        .shipment-row input:focus { border-color: #e94560; }
        
        .w-in { width: 150px; }
        .v-in { width: 150px; }
        .dest-field { flex: 2; }

        .btn-group { display: flex; gap: 20px; margin-top: 30px; }
        .btn-add-row {
            flex: 1;
            padding: 16px;
            background: #16213e;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-add-row:hover { background: #0f3460; }
        .btn-run {
            flex: 2;
            background: #e94560;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-run:hover { background: #c72c41; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(233, 69, 96, 0.3); }
        
        #source-addr { color: #e94560; font-weight: 800; }
    </style>
</head>
<body>
    <div class="entry-container">
        <div class="header-box">
            <h2 style="color: #1a1a2e; font-size: 1.8rem; margin:0;">Shipment Planning Portal</h2>
            <p style="color: #666; font-size: 0.95rem; margin-top: 5px;">
                Dispatch Base: <span id="source-addr">Noida Logistics Hub (Sector 62)</span>
            </p>
        </div>

        <div id="shipment-list">
            <div class="shipment-row">
                <input type="number" placeholder="Weight (kg)" class="w-in">
                <input type="number" placeholder="Volume (m3)" class="v-in">
                <input type="text" placeholder="Destination (e.g., Mumbai, Pune, Agra)" class="d-in dest-field">
            </div>
        </div>

        <div class="btn-group">
            <button onclick="addRow()" class="btn-add-row">+ Add Shipment</button>
            <button onclick="runOptimization()" class="btn-run">Process Optimized Dispatch</button>
        </div>
        
        <p style="text-align: center; margin-top: 25px; font-size: 0.85rem; color: #777; font-style: italic;">
            * AI Engine will calculate shortest route via Dijkstra and assign best-fit fleet via Greedy logic.
        </p>
    </div>

    <script>
        function addRow() {
            const container = document.getElementById('shipment-list');
            const row = document.createElement('div');
            row.className = 'shipment-row';
            row.innerHTML = `
                <input type="number" placeholder="Weight (kg)" class="w-in">
                <input type="number" placeholder="Volume (m3)" class="v-in">
                <input type="text" placeholder="Destination" class="d-in dest-field">
            `;
            container.appendChild(row);
        }

        function runOptimization() {
            const weights = document.querySelectorAll('.w-in');
            const volumes = document.querySelectorAll('.v-in');
            const dests = document.querySelectorAll('.d-in');
            let data = [];
            
            weights.forEach((w, i) => {
                // We check for Weight and Destination. Distance is handled by C++ Backend.
                if(w.value && dests[i].value) {
                    data.push({ 
                        id: i + 1, 
                        weight: w.value, 
                        volume: volumes[i].value || 0,
                        dest: dests[i].value 
                    });
                }
            });

            if(data.length === 0) {
                alert("Please enter shipment details and destination.");
                return;
            }

            // Sync with LocalStorage for the Dashboard bridge
            localStorage.setItem('pending_shipments', JSON.stringify(data));
            
            // Redirect to dashboard
            const urlParams = new URLSearchParams(window.location.search);
            const user = urlParams.get('user') || 'Apurv';
            window.location.href = `index.html?role=manager&user=${encodeURIComponent(user)}`;
        }
    </script>
</body>
</html>
